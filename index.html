<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конвертер валют</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Конвертер валют</h1>
    <div class="converter">
      <input type="number" id="amount" placeholder="Введите сумму (RUB)">
      <select id="currency">
        <option value="USD">USD - Доллар США</option>
        <option value="EUR">EUR - Евро</option>
        <option value="GBP">GBP - Фунт стерлингов</option>
        <option value="KZT">KZT - Казахстанский тенге</option>
        <option value="BYN">BYN - Белорусский рубль</option>
      </select>
      <button id="convertBtn">Конвертировать</button>
      <div id="result"></div>
    </div>
  </div>
  <script type="module" src="js/samost.js"></script>
</body>
</html>
